name: Build and Deploy to AWS

on:
  push:
  pull_request:
    types: [opened]
  workflow_dispatch:

env:
  JAR_FILENAME: LegendsOfTheThreeKingdoms
  ARTIFACT_NAME: backend-app
  SYSTEMD_SERVICE_NAME: ThreeKingdoms

jobs:
  build:
    name: Build on GitHub
    runs-on: ubuntu-latest

    steps:
      # Checkout the repo
      - name: git checkout
        uses: actions/checkout@v3

      # Setup JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "corretto"

      # Debugging MONGODB_URI
      - name: Debugging MONGODB_URI
        run: echo "MONGODB_URI=${{ secrets.MONGODB_URI }}"

      # 替換 application.properties 中的參數
      - name: 替換 application.properties 參數
        run: |
          sed -i "s|^spring.data.mongodb.uri=.*|spring.data.mongodb.uri=${{ secrets.MONGODB_URI }}|" LegendsOfTheThreeKingdoms/spring/src/main/resources/application.properties

      # 確認替換後的文件內容
      - name: 確認 application.properties 的修改
        run: cat LegendsOfTheThreeKingdoms/spring/src/main/resources/application.properties

      # List Pom.xml
      - name: List LegendsOfTheThreeKingdoms Files
        run: ls
      # Get Path
      - name: Get Path
        run: pwd

      # Maven Verify
      - name: Maven Verify
        env:
          DOCKER_HOST: unix:///var/run/docker.sock
        run: mvn -f LegendsOfTheThreeKingdoms/pom.xml -B verify -DJAR_FILENAME=${{ env.JAR_FILENAME }}

      # Dump GitHub Context
      - name: Dump GitHub Context
        env:
          GITHUB_CONTEXT: ${{ toJSON(github) }}
        run: |
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$GITHUB_CONTEXT" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
      - name: List LegendsOfTheThreeKingdoms
        run: ls LegendsOfTheThreeKingdoms/spring/target

      # Publish Artifact
      - name: Upload Artifact
        if: github.event_name == 'push' && github.ref_name == 'main'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: |
            LegendsOfTheThreeKingdoms/spring/target/spring-*.jar
            LegendsOfTheThreeKingdoms/docker/Dockerfile
  docker-push:
    name: Docker Push
    runs-on: ubuntu-latest
    needs: build
    environment: production
    if: github.event_name == 'push' && github.ref_name == 'main'

    steps:
      # Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # Login to Amazon ECR Public
      - name: Login to Amazon ECR Public
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      # Download Artifact
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: .
      - name: List All Target File
        run: ls
      - name: Get Path
        run: pwd
      # Docker build & push to AWS ECR Public
      - name: Docker build & push
        run: |
          docker build \
            --build-arg JAR_FILENAME=target/${{ env.JAR_FILENAME }}.jar \
            -t ${{ vars.AWS_ECR_URI }}/${{ vars.AWS_ECR_REPOSITORY_NAME }}:latest \
            -t ${{ vars.AWS_ECR_URI }}/${{ vars.AWS_ECR_REPOSITORY_NAME }}:${{ github.sha }} \
            -f docker/Dockerfile \
            .
          docker push ${{ vars.AWS_ECR_URI }}/${{ vars.AWS_ECR_REPOSITORY_NAME }} --all-tags

      # Login to NAS Registry
      - name: Login to NAS Registry
        run: echo "${{ secrets.NAS_REGISTRY_PASSWORD }}" | docker login registry.parsons125.in -u "${{ secrets.NAS_REGISTRY_USERNAME }}" --password-stdin

      # Docker tag & push to NAS Registry
      - name: Docker push to NAS Registry
        run: |
          TIMESTAMP=$(date -u +%Y%m%d%H%M%S)
          docker tag ${{ vars.AWS_ECR_URI }}/${{ vars.AWS_ECR_REPOSITORY_NAME }}:latest registry.parsons125.in/three-kingdoms:latest
          docker tag ${{ vars.AWS_ECR_URI }}/${{ vars.AWS_ECR_REPOSITORY_NAME }}:latest registry.parsons125.in/three-kingdoms:${TIMESTAMP}
          docker push registry.parsons125.in/three-kingdoms:latest
          docker push registry.parsons125.in/three-kingdoms:${TIMESTAMP}

      # Trigger NAS redeploy
      - name: Trigger NAS Redeploy
        run: curl -sf -X POST "https://webhook.parsons125.in/hooks/redeploy-3k-be-app?token=${{ secrets.NAS_REDEPLOY_TOKEN }}"
  deploy:
    name: Deploy to AWS EC2
    needs: docker-push
    runs-on: ubuntu-latest
    environment: production
    if: github.event_name == 'push' && github.ref_name == 'main'

    steps:
      # Restart systemd service
      - name: Run Application
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          port: 22
          key: ${{ secrets.EC2_KEY }}
          script: |
            uname -a
            whoami
            pwd
            sudo systemctl restart ${{ env.SYSTEMD_SERVICE_NAME }}

  # === Discord 通知：PR 開啟 ===
  notify-pr-opened:
    name: Notify PR Opened
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'opened'
    steps:
      - name: Send PR notification to Discord
        uses: actions/github-script@v7
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          script: |
            const pr = context.payload.pull_request;
            const payload = {
              content: `## :scroll: 新的奏摺（Pull Request）\n亮有一計，可助破敵：\n**${pr.title}** (#${pr.number})\n提交者：${pr.user.login}\n\n觀星象，知天時 :point_right:[審閱軍情](${pr.html_url})`,
              username: '諸葛亮',
              avatar_url: 'https://3k.parsons125.in/zhuge-liang.png'
            };
            const res = await fetch(process.env.DISCORD_WEBHOOK_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });
            if (!res.ok) throw new Error(`Discord webhook failed: ${res.status}`);

  # === Discord 通知：Merge + CI/CD 成功 ===
  notify-deploy-success:
    name: Notify Deploy Success
    runs-on: ubuntu-latest
    needs: [build, docker-push, deploy]
    if: github.event_name == 'push' && github.ref_name == 'main' && success()
    steps:
      - name: Send success notification to Discord
        uses: actions/github-script@v7
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          script: |
            const commits = context.payload.commits;
            const issueRegex = /\#(\d+)/g;
            const icons = {
              feat: '<:thumb:1239951662832156752>',
              fix: ':construction_site:',
              style: ':paintbrush:',
              default: ':hammer_and_wrench:'
            };

            const iconMessages = commits.map(commit => {
              const message = commit.message.split('\n')[0];
              const [commitType, ...rest] = message.split(': ');
              if (!['feat', 'fix', 'style', 'refactor'].includes(commitType)) return;
              const icon = icons[commitType] || icons.default;
              const issueMatches = commit.message.match(issueRegex);
              const issues = issueMatches ? issueMatches.map(m => m.slice(1)) : [];
              const issueLinks = issues.map(i => `[#${i}](${context.payload.repository.html_url}/issues/${i})`).join(', ');
              return icon + ' ' + rest.join(': ') + (issueLinks ? ' (' + issueLinks + ')' : '');
            }).filter(Boolean);

            const commitList = iconMessages.length > 0 ? iconMessages.join('\n') : ':package: 維護更新';

            const payload = {
              content: `## :white_check_mark: 奉天承運，皇帝詔曰：\n${commitList}\n\n部署成功！望卿等克盡厥職，共創霸業！ :point_right: [三國殺](https://3k.parsons125.in/)`,
              username: '關羽',
              avatar_url: 'https://3k.parsons125.in/guan-yu.png'
            };
            const res = await fetch(process.env.DISCORD_WEBHOOK_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });
            if (!res.ok) throw new Error(`Discord webhook failed: ${res.status}`);

  # === Discord 通知：Merge + CI/CD 失敗 ===
  notify-deploy-failure:
    name: Notify Deploy Failure
    runs-on: ubuntu-latest
    needs: [build, docker-push, deploy]
    if: always() && github.event_name == 'push' && github.ref_name == 'main' && (needs.build.result == 'failure' || needs.docker-push.result == 'failure' || needs.deploy.result == 'failure')
    steps:
      - name: Send failure notification to Discord
        uses: actions/github-script@v7
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          script: |
            const buildResult = '${{ needs.build.result }}';
            const pushResult = '${{ needs.docker-push.result }}';
            const deployResult = '${{ needs.deploy.result }}';

            const failedSteps = [];
            if (buildResult === 'failure') failedSteps.push(':hammer_and_wrench: Build');
            if (pushResult === 'failure') failedSteps.push(':whale: Docker Push');
            if (deployResult === 'failure') failedSteps.push(':rocket: Deploy');

            const runUrl = `${context.payload.repository.html_url}/actions/runs/${context.runId}`;
            const payload = {
              content: `## :x: 戰報：部署失敗！\n失敗環節：${failedSteps.join('、')}\n\n:point_right: [查看詳情](${runUrl})`,
              username: '關羽',
              avatar_url: 'https://3k.parsons125.in/guan-yu.png'
            };
            const res = await fetch(process.env.DISCORD_WEBHOOK_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });
            if (!res.ok) throw new Error(`Discord webhook failed: ${res.status}`);
